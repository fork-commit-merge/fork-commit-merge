<!-- HTML - Medium -->

<!doctype html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="styles.css" />
    </head>
    <body>
        <div class="container">
            <form action="">
                <h1>Contact Form</h1>
                <label for="name">
                    <div>Name:</div>
                    <input
                        type="text"
                        name="name"
                        id="name"
                        placeholder="Enter your name"
                    />
                </label>
                <label for="email">
                    <div>Email:</div>
                    <input
                        type="email"
                        name="email"
                        id="email"
                        placeholder="username@example.com"
                    />
                </label>
                <label for="msg">
                    <div>Message:</div>
                    <textarea
                        name="msg"
                        id="msg"
                        placeholder="Enter your message here"
                    ></textarea>
                </label>
                <input type="submit" value="Submit">
            </form>
        </div>
    </body>
</html>
