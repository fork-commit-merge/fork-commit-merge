<!-- Tailwind CSS - Easy -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fork, Commit, Merge - Tailwind CSS - Easy</title>
    <link href="../output.css" rel="stylesheet" />
  </head>
  <body class="m-5 flex justify-center items-center min-h-screen bg-gray-100">
    <div class="max-w-sm rounded overflow-hidden shadow-lg bg-white">
      <div class="md:flex">
        <div class="md:flex-shrink-0">
          <img
            class="h-48 w-full object-cover md:h-full md:w-48"
            src="https://source.unsplash.com/random/480x480"
            alt="Random Image"
          />
        </div>
        <div class="p-8">
          <div class="text-gray-500 text-sm">Category</div>
          <h2 class="text-xl font-bold text-gray-900">Card Title</h2>
          <a href="#" class="text-indigo-600 hover:text-indigo-800">Card Subtitle</a>
          <p class="mt-2 text-gray-600">This is some body text to explain more about the card.</p>
          <button class="mt-4 px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Call to Action</button>
        </div>
      </div>
    </div>
  </body>
</html>
